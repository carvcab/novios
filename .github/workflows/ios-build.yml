name: iOS Build

on:
  workflow_dispatch:
    inputs:
      build_id:
        description: 'Unique build identifier'
        required: true
        type: string
      ios_path:
        description: 'Path to iOS project'
        required: false
        type: string
        default: 'iphone app'
      scheme:
        description: 'Xcode scheme to build (auto-detected if empty)'
        required: false
        type: string
        default: 'Novios'
      use_signing:
        description: 'Enable code signing (requires secrets to be configured)'
        required: false
        type: boolean
        default: false
      configuration:
        description: 'Build configuration (Debug is faster, Release for production)'
        required: false
        type: string
        default: 'Debug'

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install CocoaPods dependencies
        env:
          IOS_PATH: ${{ inputs.ios_path }}
        run: |
          cd "$IOS_PATH"
          if ! command -v pod &> /dev/null; then
            gem install cocoapods --no-document
          fi
          pod install

      - name: Build llama.cpp static library for iOS
        env:
          LLAMA_PATH: ${{ inputs.ios_path }}/Novios/llama/llama.cpp
        run: |
          set -e
          SRC_DIR="${LLAMA_PATH}"
          OUT_DIR="${LLAMA_PATH}/../llama-framework"
          mkdir -p "${OUT_DIR}/include" "${OUT_DIR}/lib" "${OUT_DIR}/obj"
          
          cp "${SRC_DIR}/include/llama.h" "${OUT_DIR}/include/" 2>/dev/null || true
          
          SDK_PATH=$(xcrun --sdk iphoneos --show-sdk-path)
          ARCH="-arch arm64"
          SYSROOT="-isysroot ${SDK_PATH}"
          BASE_FLAGS="-O3 -DNDEBUG -DLLAMA_SHARED=0 -DGGML_SHARED=0 -fPIC ${ARCH} ${SYSROOT} -miphoneos-version-min=15.0"
          CXX_FLAGS="${BASE_FLAGS} -std=c++11"
          INC="-I${SRC_DIR}/include -I${SRC_DIR}/ggml/include -I${SRC_DIR}/ggml/src -I${SRC_DIR}/src"
          
          # Compile C++ sources
          while IFS= read -r -d '' f; do
            echo "CXX $f"
            clang++ ${CXX_FLAGS} ${INC} -c "$f" -o "${OUT_DIR}/obj/$(basename "$f" .cpp).o" 2>&1 || true
          done < <(find "${SRC_DIR}/src" -name "*.cpp" -not -path "*/models/*" -print0)
          
          while IFS= read -r -d '' f; do
            echo "CXX $f"
            clang++ ${CXX_FLAGS} ${INC} -c "$f" -o "${OUT_DIR}/obj/$(basename "$f" .cpp).o" 2>&1 || true
          done < <(find "${SRC_DIR}/ggml/src" -name "*.cpp" -print0)
          
          # Compile C sources
          while IFS= read -r -d '' f; do
            echo "CC $f"
            clang ${BASE_FLAGS} ${INC} -c "$f" -o "${OUT_DIR}/obj/$(basename "$f" .c).o" 2>&1 || true
          done < <(find "${SRC_DIR}/ggml/src" -name "*.c" -print0)
          
          # Create static library
          cd "${OUT_DIR}/obj"
          ar rcs "${OUT_DIR}/lib/libllama.a" *.o 2>/dev/null || true
          cd "${SRC_DIR}"
          
          echo "llama.cpp build completed."
          ls -la "${OUT_DIR}/lib/" 2>/dev/null || echo "Library not built"

      - name: Build IPA
        env:
          BUILD_ID: ${{ inputs.build_id }}
          IOS_PATH: ${{ inputs.ios_path }}
          SCHEME: ${{ inputs.scheme }}
          USE_SIGNING: ${{ inputs.use_signing }}
          CONFIGURATION: ${{ inputs.configuration }}
        run: |
          set -e
          cd "$IOS_PATH"

          PROJECT=$(find . -maxdepth 1 -name "*.xcodeproj" | head -1)
          WORKSPACE=$(find . -maxdepth 1 -name "*.xcworkspace" | head -1)
          echo "Project: $PROJECT"
          echo "Workspace: $WORKSPACE"
          echo "Scheme: $SCHEME"
          echo "Configuration: $CONFIGURATION"
          echo "Signing: $USE_SIGNING"

          DERIVED_DATA_PATH="${GITHUB_WORKSPACE}/DerivedData"
          LLAMA_LIB="${GITHUB_WORKSPACE}/${IOS_PATH}/Novios/llama/llama-framework"

          if [ -n "$WORKSPACE" ]; then
            BUILD_CMD="xcodebuild -workspace $WORKSPACE"
          else
            BUILD_CMD="xcodebuild -project $PROJECT"
          fi
          BUILD_CMD="$BUILD_CMD -scheme $SCHEME"
          BUILD_CMD="$BUILD_CMD -configuration $CONFIGURATION"
          BUILD_CMD="$BUILD_CMD -destination 'generic/platform=iOS'"
          BUILD_CMD="$BUILD_CMD -derivedDataPath $DERIVED_DATA_PATH"
          BUILD_CMD="$BUILD_CMD COMPILER_INDEX_STORE_ENABLE=NO"
          BUILD_CMD="$BUILD_CMD DEBUG_INFORMATION_FORMAT=dwarf"
          BUILD_CMD="$BUILD_CMD ONLY_ACTIVE_ARCH=YES"
          BUILD_CMD="$BUILD_CMD -quiet"
          export LLAMA_LIB_DIR="${LLAMA_LIB}/lib"
          BUILD_CMD="$BUILD_CMD LIBRARY_SEARCH_PATHS='${LLAMA_LIB_DIR}'"
          BUILD_CMD="$BUILD_CMD OTHER_LDFLAGS='-lllama -framework Metal -framework Accelerate'"

          if [ "$USE_SIGNING" = "true" ]; then
            BUILD_CMD="$BUILD_CMD -archivePath ${GITHUB_WORKSPACE}/build/App.xcarchive archive"
          else
            BUILD_CMD="$BUILD_CMD CODE_SIGNING_ALLOWED=NO build"
          fi

          echo "Running: $BUILD_CMD"
          eval $BUILD_CMD

          if [ "$USE_SIGNING" = "true" ]; then
            cd "${GITHUB_WORKSPACE}"
            printf '%s\n' \
              '<?xml version="1.0" encoding="UTF-8"?>' \
              '<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">' \
              '<plist version="1.0">' \
              '<dict>' \
              '    <key>method</key>' \
              '    <string>development</string>' \
              '    <key>signingStyle</key>' \
              '    <string>automatic</string>' \
              '</dict>' \
              '</plist>' > ExportOptions.plist
            xcodebuild -exportArchive \
              -archivePath build/App.xcarchive \
              -exportOptionsPlist ExportOptions.plist \
              -exportPath build/export
            mv build/export/*.ipa "build/$BUILD_ID.ipa"
          else
            APP_PATH=$(find "$DERIVED_DATA_PATH/Build/Products/${CONFIGURATION}-iphoneos" -name "*.app" -type d | head -1)
            if [ -z "$APP_PATH" ]; then
              echo "Error: Could not find .app"
              exit 1
            fi
            echo "Found app at: $APP_PATH"
            cd "${GITHUB_WORKSPACE}"
            mkdir -p build/Payload
            cp -R "$APP_PATH" build/Payload/
            cd build
            zip -rq "$BUILD_ID.ipa" Payload
            rm -rf Payload
            echo "Created IPA: build/$BUILD_ID.ipa"
          fi

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ipa
          path: build/*.ipa
          retention-days: 7
          if-no-files-found: error
          overwrite: true

      - name: Build summary
        if: always()
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Build ID:** ${{ inputs.build_id }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Configuration:** ${{ inputs.configuration }}" >> $GITHUB_STEP_SUMMARY
